name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build DMG & Create Release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update VERSION file
        run: echo "${{ steps.version.outputs.version }}" > VERSION

      - name: Install create-dmg
        run: brew install create-dmg || true

      - name: Clean and build DMG
        run: make clean && make dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: MakeMyMacFastAgain-${{ steps.version.outputs.version }}
          path: MakeMyMacFastAgain-${{ steps.version.outputs.version }}.dmg
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MakeMyMacFastAgain-${{ steps.version.outputs.version }}.dmg
          generate_release_notes: true
          draft: false
          prerelease: false
